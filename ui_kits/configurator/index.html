<!-- @startingPoint section="Screens" subtitle="Full box-calculator configurator with live 3D viewer" viewport="1440x900" -->
<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BoxForge · Configurador</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html, body { margin: 0; height: 100%; background: var(--surface-canvas); overflow: hidden; }
  #root { height: 100vh; }

  .bf-app { display: flex; flex-direction: column; height: 100vh; }

  /* ---- header ---- */
  .bf-header {
    height: var(--header-h); flex: none; display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px; background: var(--surface-panel); border-bottom: 1px solid var(--border-subtle);
  }
  .bf-header-left { display: flex; align-items: center; gap: 14px; }
  .bf-logo { display: inline-flex; align-items: center; gap: 9px; }
  .bf-logo-text { font: 600 16px var(--font-sans); letter-spacing: -0.3px; color: var(--text-primary); }
  .bf-logo-text span { color: var(--accent); }
  .bf-divider { width: 1px; height: 22px; background: var(--border-default); }
  .bf-project { display: flex; flex-direction: column; gap: 1px; white-space: nowrap; }
  .bf-project-name { font: 500 13px var(--font-sans); color: var(--text-primary); }
  .bf-project-meta { font: 400 11px var(--font-sans); color: var(--text-tertiary); }
  .bf-header-actions { display: flex; align-items: center; gap: 4px; }

  /* ---- main 3-column ---- */
  .bf-main { flex: 1; min-height: 0; display: grid; grid-template-columns: var(--sidebar-w) 1fr var(--results-w); }
  .bf-col { min-height: 0; overflow-y: auto; }
  .bf-col-inputs { border-right: 1px solid var(--border-subtle); background: var(--surface-panel); }
  .bf-col-results { border-left: 1px solid var(--border-subtle); background: var(--surface-panel); }
  .bf-col-stage { display: flex; flex-direction: column; min-width: 0; background: var(--surface-canvas); overflow-y: auto; }

  /* ---- inputs ---- */
  .inputs { display: flex; flex-direction: column; gap: 16px; padding: 16px; }
  .field-stack { display: flex; flex-direction: column; gap: 16px; }
  .field-label-row { display: flex; align-items: center; gap: 6px; margin-bottom: 9px; }
  .field-label { font-size: var(--fs-sm); font-weight: var(--fw-medium); color: var(--text-secondary); letter-spacing: var(--ls-snug); }

  /* ---- viewer stage ---- */
  .bf-col-stage { padding: 16px; gap: 16px; }
  .vs { position: relative; flex: 1 0 auto; min-height: 440px; border-radius: var(--radius-xl); overflow: hidden;
    background: var(--stage-bg); border: 1px solid var(--border-subtle); box-shadow: var(--ring-hairline); }
  .vs-canvas { position: absolute; inset: 0; }
  .vs-topbar { position: absolute; top: 12px; left: 12px; right: 12px; display: flex; align-items: center; justify-content: space-between; pointer-events: none; }
  .vs-tag { display: inline-flex; align-items: center; gap: 7px; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.04em;
    color: var(--text-secondary); background: rgba(14,17,22,0.7); border: 1px solid var(--border-subtle); border-radius: var(--radius-full); padding: 5px 11px; backdrop-filter: blur(6px); }
  .vs-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); box-shadow: 0 0 0 3px var(--success-quiet); }
  .vs-icon { pointer-events: auto; display: inline-flex; align-items: center; justify-content: center; width: 30px; height: 30px;
    color: var(--text-secondary); background: rgba(14,17,22,0.7); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); cursor: pointer; backdrop-filter: blur(6px); }
  .vs-icon:hover { color: var(--text-primary); border-color: var(--border-strong); }

  .vs-toolbar { position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 4px;
    padding: 5px; background: rgba(16,17,21,0.82); border: 1px solid var(--border-default); border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg); backdrop-filter: blur(12px); }
  .vs-ctrl { display: inline-flex; align-items: center; gap: 7px; height: 32px; padding: 0 12px; border: none; background: transparent;
    color: var(--text-secondary); font: 500 13px var(--font-sans); border-radius: var(--radius-md); cursor: pointer; white-space: nowrap;
    transition: background var(--dur-fast) var(--ease-standard), color var(--dur-fast) var(--ease-standard); }
  .vs-ctrl:hover { background: var(--surface-hover); color: var(--text-primary); }
  .vs-ctrl.is-active { background: var(--accent-quiet); color: var(--accent); }
  .vs-sep { width: 1px; height: 20px; background: var(--border-default); margin: 0 2px; }
  .vs-hint { position: absolute; bottom: 16px; right: 14px; font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary); opacity: 0.7; }

  /* ---- results ---- */
  .results { display: flex; flex-direction: column; gap: 16px; padding: 16px; }
  .res-hero { display: flex; align-items: center; gap: 18px; padding: 18px; background: var(--surface-card);
    border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); box-shadow: var(--ring-hairline); }
  .res-hero-meta { display: flex; flex-direction: column; gap: 7px; align-items: flex-start; }
  .res-grid-val { font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-size: 22px; font-weight: 600;
    color: var(--text-primary); letter-spacing: -0.01em; }
  .res-warn { display: flex; align-items: flex-start; gap: 9px; padding: 11px 13px; background: var(--warning-quiet);
    border: 1px solid rgba(224,162,61,0.25); border-radius: var(--radius-md); color: var(--warning); font-size: var(--fs-caption); line-height: 1.45; }
  .res-warn svg { flex: none; margin-top: 1px; }
  .res-metrics { display: flex; flex-direction: column; gap: 16px; }
  .res-metrics-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding-top: 14px; border-top: 1px solid var(--border-subtle); }
  .res-options { display: flex; flex-direction: column; gap: 10px; }

  /* ---- budget ---- */
  .budget { flex: none; }
  .budget-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--border-subtle); }
  .budget-title { display: flex; align-items: center; gap: 11px; color: var(--text-secondary); }
  .budget-title > div { display: flex; flex-direction: column; gap: 1px; }
  .budget-h { margin: 0; font: 600 16px var(--font-sans); color: var(--text-primary); letter-spacing: -0.2px; }
  .budget-table { width: 100%; border-collapse: collapse; }
  .budget-table th { text-align: left; padding: 10px 18px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em;
    text-transform: uppercase; color: var(--text-tertiary); font-weight: 500; border-bottom: 1px solid var(--border-subtle); }
  .budget-table th.num, .budget-table td.num { text-align: right; }
  .budget-table td { padding: 12px 18px; border-bottom: 1px solid var(--border-subtle); font-size: var(--fs-sm); color: var(--text-secondary); }
  .budget-table td.num { font-family: var(--font-mono); font-variant-numeric: tabular-nums; color: var(--text-secondary); }
  .budget-table td.strong { color: var(--text-primary); font-weight: 500; }
  .bt-concept { font-size: var(--fs-body); color: var(--text-primary); font-weight: 500; }
  .bt-detail { font-size: var(--fs-caption); color: var(--text-tertiary); margin-top: 2px; }
  .budget-foot { display: flex; align-items: center; justify-content: space-between; gap: 20px; padding: 14px 18px; }
  .budget-note { display: flex; align-items: center; gap: 7px; font-size: var(--fs-caption); color: var(--text-tertiary); max-width: 280px; line-height: 1.45; }
  .budget-note svg { flex: none; color: var(--warning); }
  .budget-total { display: flex; align-items: center; gap: 22px; }
  .budget-total-row { display: flex; flex-direction: column; align-items: flex-end; gap: 1px; }
  .budget-total-row span { font-size: var(--fs-caption); color: var(--text-tertiary); }
  .budget-total-row b { font-family: var(--font-mono); font-size: 26px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.01em; }
  .budget-actions { display: flex; gap: 8px; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="../../viewer/packing.js"></script>
<script type="module" src="../../viewer/box-viewer.js"></script>

<script type="text/babel" src="Icons.kit.js"></script>
<script type="text/babel" src="ViewerStage.kit.js"></script>
<script type="text/babel" src="InputsPanel.kit.js"></script>
<script type="text/babel" src="ResultsPanel.kit.js"></script>
<script type="text/babel" src="BudgetSection.kit.js"></script>
<script type="text/babel" src="Configurator.kit.js"></script>
</body>
</html>
